<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     width="256"
     height="256"
     fill="none">

  <defs>
    <linearGradient id="teal" x1="76" y1="68" x2="178" y2="178" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>

    <linearGradient id="purple" x1="76" y1="56" x2="196" y2="196" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>

    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- replay loop -->
  <path
    d="M190 83
       C174 57 141 44 110 52
       C73 62 50 99 60 136
       C70 173 108 196 145 186
       C171 179 190 158 196 132"
    stroke="#111827"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <path
    d="M190 83
       C174 57 141 44 110 52
       C73 62 50 99 60 136
       C70 173 108 196 145 186
       C171 179 190 158 196 132"
    stroke="url(#purple)"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- arrow head -->
  <path
    d="M194 132 L214 125 L204 151"
    stroke="#111827"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <path
    d="M194 132 L214 125 L204 151"
    stroke="url(#purple)"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- play/runtime triangle -->
  <g filter="url(#shadow)">
    <path
      d="M110 88
         C110 82 116 78 121 81
         L165 108
         C171 112 171 120 165 124
         L121 151
         C116 154 110 150 110 144
         Z"
      fill="url(#teal)"
      stroke="#111827"
      stroke-width="7"
      stroke-linejoin="round"/>
  </g>

  <!-- trace replay dots -->
  <circle cx="172" cy="169" r="5" fill="#0891B2"/>
  <circle cx="188" cy="156" r="4" fill="#14B8A6" opacity="0.85"/>
  <circle cx="200" cy="141" r="3.5" fill="#8B5CF6" opacity="0.75"/>

</svg>