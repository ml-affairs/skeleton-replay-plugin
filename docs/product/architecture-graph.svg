<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     width="256"
     height="256"
     fill="none">

  <defs>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#31D6D1"/>
      <stop offset="100%" stop-color="#1198B5"/>
    </linearGradient>

    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDBA74"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>

    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="3"
                    flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- connections -->
  <g stroke="#162033"
     stroke-width="7"
     stroke-linecap="round"
     stroke-linejoin="round">

    <path d="M128 128 L78 74"/>
    <path d="M128 128 L176 74"/>
    <path d="M128 128 L72 180"/>
    <path d="M128 128 L184 170"/>

    <path d="M78 74 L176 74" opacity=".35"/>
    <path d="M72 180 L184 170" opacity=".35"/>

  </g>

  <!-- active edge -->
  <path d="M128 128 L184 170"
        stroke="#2DD4BF"
        stroke-width="5"
        stroke-linecap="round"
        stroke-dasharray="10 8"/>

  <!-- central runtime node -->
  <g filter="url(#shadow)">
      <circle cx="128"
              cy="128"
              r="24"
              fill="url(#purple)"
              stroke="#162033"
              stroke-width="6"/>
  </g>

  <!-- outer nodes -->
  <g filter="url(#shadow)">

      <circle cx="78"
              cy="74"
              r="16"
              fill="url(#teal)"
              stroke="#162033"
              stroke-width="5"/>

      <circle cx="176"
              cy="74"
              r="16"
              fill="url(#orange)"
              stroke="#162033"
              stroke-width="5"/>

      <circle cx="72"
              cy="180"
              r="16"
              fill="url(#blue)"
              stroke="#162033"
              stroke-width="5"/>

      <circle cx="184"
              cy="170"
              r="16"
              fill="url(#orange)"
              stroke="#162033"
              stroke-width="5"/>

  </g>

  <!-- subtle highlight -->
  <circle cx="121"
          cy="120"
          r="5"
          fill="white"
          opacity=".35"/>

</svg>