<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     width="256"
     height="256"
     fill="none">

  <defs>

    <linearGradient id="trace"
                    x1="72"
                    y1="72"
                    x2="188"
                    y2="184"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <linearGradient id="node"
                    x1="0"
                    y1="0"
                    x2="1"
                    y2="1">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0"
                    dy="3"
                    stdDeviation="3"
                    flood-opacity="0.18"/>
    </filter>

  </defs>

  <!-- inactive graph -->

  <g stroke="#CBD5E1"
     stroke-width="6"
     stroke-linecap="round">

    <path d="M72 72 L128 72"/>
    <path d="M128 72 L184 72"/>
    <path d="M128 72 L128 128"/>
    <path d="M128 128 L184 184"/>

  </g>

  <!-- active execution -->

  <g stroke="url(#trace)"
     stroke-width="10"
     stroke-linecap="round">

    <path d="M72 184 L128 184"/>
    <path d="M128 184 L184 184"/>

  </g>

  <!-- execution arrow -->

  <path d="M168 170 L184 184 L168 198"
        stroke="url(#trace)"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- nodes -->

  <g filter="url(#shadow)">

    <circle cx="72" cy="72" r="12"
            fill="url(#node)"
            stroke="#111827"
            stroke-width="5"/>

    <circle cx="128" cy="72" r="12"
            fill="url(#node)"
            stroke="#111827"
            stroke-width="5"/>

    <circle cx="184" cy="72" r="12"
            fill="#FDBA74"
            stroke="#111827"
            stroke-width="5"/>

    <circle cx="128" cy="128" r="12"
            fill="#A78BFA"
            stroke="#111827"
            stroke-width="5"/>

    <circle cx="72" cy="184" r="12"
            fill="url(#node)"
            stroke="#111827"
            stroke-width="5"/>

    <circle cx="128" cy="184" r="12"
            fill="#A78BFA"
            stroke="#111827"
            stroke-width="5"/>

    <circle cx="184" cy="184" r="14"
            fill="url(#trace)"
            stroke="#111827"
            stroke-width="6"/>

  </g>

</svg>