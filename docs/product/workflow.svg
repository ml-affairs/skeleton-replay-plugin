<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     width="256"
     height="256"
     fill="none">

  <defs>

    <linearGradient id="workflow"
                    x1="80"
                    y1="48"
                    x2="176"
                    y2="208"
                    gradientUnits="userSpaceOnUse">

      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#8B5CF6"/>

    </linearGradient>

    <linearGradient id="node"
                    x1="0"
                    y1="0"
                    x2="1"
                    y2="1">

      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#0891B2"/>

    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0"
                    dy="3"
                    stdDeviation="3"
                    flood-opacity=".18"/>
    </filter>

  </defs>

  <!-- inactive workflow -->

  <g stroke="#CBD5E1"
     stroke-width="6"
     stroke-linecap="round"
     stroke-linejoin="round">

      <path d="M128 52 L128 92"/>

      <path d="M128 92 L88 128"/>

      <path d="M128 92 L168 128"/>

      <path d="M88 128 L128 170"/>

      <path d="M168 128 L128 170"/>

  </g>

  <!-- active execution -->

  <g stroke="url(#workflow)"
     stroke-width="9"
     stroke-linecap="round"
     stroke-linejoin="round">

      <path d="M128 170 L128 208"/>

  </g>

  <!-- arrow -->

  <path d="M118 196 L128 208 L138 196"
        stroke="url(#workflow)"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- nodes -->

  <g filter="url(#shadow)">

      <circle cx="128" cy="52"
              r="12"
              fill="url(#node)"
              stroke="#111827"
              stroke-width="5"/>

      <circle cx="128" cy="92"
              r="12"
              fill="#A78BFA"
              stroke="#111827"
              stroke-width="5"/>

      <circle cx="88" cy="128"
              r="12"
              fill="#FDBA74"
              stroke="#111827"
              stroke-width="5"/>

      <circle cx="168" cy="128"
              r="12"
              fill="#67E8F9"
              stroke="#111827"
              stroke-width="5"/>

      <circle cx="128" cy="170"
              r="12"
              fill="#A78BFA"
              stroke="#111827"
              stroke-width="5"/>

      <!-- completed workflow -->

      <circle cx="128" cy="208"
              r="15"
              fill="url(#workflow)"
              stroke="#111827"
              stroke-width="6"/>

  </g>

</svg>